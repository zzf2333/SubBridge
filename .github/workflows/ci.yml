name: CI

on:
    push:
        branches:
            - '**'
    pull_request:

jobs:
    test-and-build:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.5'

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun run test

            - name: Build
              run: bun run build

            - name: Pack (Dry Run)
              run: npm_config_cache=/tmp/.npm-cache npm pack --dry-run

            - name: Smoke
              run: REQUIRE_WEB_SMOKE=1 bun run smoke
