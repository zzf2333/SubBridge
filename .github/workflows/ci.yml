name: CI

on:
    push:
        branches:
            - '**'
    pull_request:

jobs:
    test-and-build:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        env:
            SING_BOX_VERSION: '1.13.1'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.5'

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Install sing-box
              run: |
                  curl -fsSL \
                    -o /tmp/sing-box.tar.gz \
                    "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
                  tar -xzf /tmp/sing-box.tar.gz -C /tmp
                  sudo install -m 0755 \
                    "/tmp/sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" \
                    /usr/local/bin/sing-box

            - name: Print sing-box version
              run: sing-box version

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun run test

            - name: Build
              run: bun run build

            - name: SEO Check
              run: bun run seo:check

            - name: Verify Representative Fixtures
              run: bun run verify:fixtures

            - name: Pack (Dry Run)
              run: npm_config_cache=/tmp/.npm-cache npm pack --dry-run

            - name: Smoke
              run: REQUIRE_WEB_SMOKE=1 bun run smoke

    public-real-check:
        needs: test-and-build
        runs-on: ubuntu-latest
        timeout-minutes: 20
        continue-on-error: true
        env:
            SING_BOX_VERSION: '1.13.1'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.3.5'

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Install sing-box
              run: |
                  curl -fsSL \
                    -o /tmp/sing-box.tar.gz \
                    "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
                  tar -xzf /tmp/sing-box.tar.gz -C /tmp
                  sudo install -m 0755 \
                    "/tmp/sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" \
                    /usr/local/bin/sing-box

            - name: Check Public Real Fixtures
              run: bun run check:public-real -- --report /tmp/public-real-report.json

            - name: Summarize Public Real Check
              if: always()
              run: |
                  if [ ! -f /tmp/public-real-report.json ]; then
                    echo "No public real report generated."
                    exit 0
                  fi
                  bun -e "
                    const report = JSON.parse(await Bun.file('/tmp/public-real-report.json').text());
                    const failed = report.cases.filter((item) => !item.passed);
                    console.log('Public real fixture summary');
                    console.log(\`- passed: \${report.summary.passed}\`);
                    console.log(\`- failed: \${report.summary.failed}\`);
                    if (failed.length > 0) {
                      console.log('Regressions:');
                      for (const item of failed) {
                        console.log(\`- \${item.file} [\${item.stage}]: \${item.message}\`);
                      }
                    }
                    const lines = [
                      '## Public Real Check',
                      '',
                      \`- Passed: \${report.summary.passed}\`,
                      \`- Failed: \${report.summary.failed}\`,
                    ];
                    if (failed.length > 0) {
                      lines.push('', '### Regressions');
                      for (const item of failed) {
                        lines.push(\`- \\\`\${item.file}\\\` [\${item.stage}]: \${item.message}\`);
                      }
                    }
                    await Bun.write(Bun.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
                  "

            - name: Upload Public Real Report
              if: always() && hashFiles('/tmp/public-real-report.json') != ''
              uses: actions/upload-artifact@v4
              with:
                  name: public-real-report
                  path: /tmp/public-real-report.json
                  if-no-files-found: ignore
