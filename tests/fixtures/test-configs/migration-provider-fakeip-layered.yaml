mixed-port: 7890
mode: rule

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
  respect-rules: true
  nameserver:
    - address: https://dns.google/dns-query
      detour: MissingOutbound
    - {}
  fallback:
    - tls://1.1.1.1
  nameserver-policy:
    "geosite:openai":
      - https://dns.cloudflare.com/dns-query

proxy-providers:
  remote-a:
    type: http
    url: https://example.com/providers/a.yaml
    path: ./providers/a.yaml
  remote-b:
    type: http
    url: https://example.com/providers/b.yaml
    path: ./providers/b.yaml

proxies:
  - name: NodeA
    type: ss
    server: node-a.example.com
    port: 8388
    cipher: aes-256-gcm
    password: pass-a

proxy-groups:
  - name: ProviderLeaf
    type: select
    use:
      - remote-a
      - remote-b

  - name: ProviderParent
    type: select
    proxies:
      - ProviderLeaf

  - name: Proxy
    type: select
    proxies:
      - ProviderParent
      - NodeA

rules:
  - MATCH,Proxy
