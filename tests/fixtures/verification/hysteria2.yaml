mixed-port: 7890
mode: rule

proxies:
  - name: Hysteria2 TLS
    type: hysteria2
    server: 127.0.0.1
    port: 24443
    password: hy2-password
    obfs: salamander
    obfs-password: hy2-obfs-password
    sni: runtime.local
    skip-cert-verify: true
    up: 55 Mbps
    down: 110 Mbps

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - Hysteria2 TLS

rules:
  - MATCH,Proxy
